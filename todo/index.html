<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODO</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f5f7;
      --surface:   #ffffff;
      --border:    #e2e2e7;
      --text:      #1d1d1f;
      --muted:     #86868b;
      --accent:    #0071e3;
      --accent-h:  #0077ed;
      --danger:    #ff3b30;
      --done-line: #86868b;
      --radius:    12px;
      --shadow:    0 2px 16px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px 80px;
    }

    .app {
      width: 100%;
      max-width: 560px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -.5px;
      margin-bottom: 24px;
    }

    /* ── Input ── */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 1rem;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }
    .input-row input:focus { border-color: var(--accent); }
    .input-row input::placeholder { color: var(--muted); }

    .btn-add {
      padding: 12px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
      white-space: nowrap;
    }
    .btn-add:hover  { background: var(--accent-h); }
    .btn-add:active { transform: scale(.97); }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filter-btn {
      padding: 6px 14px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      background: var(--surface);
      color: var(--muted);
      font-size: .875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Stats ── */
    .stats {
      font-size: .8125rem;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── List ── */
    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transition: opacity .2s, border-color .15s;
      animation: slideIn .18s ease;
    }
    .todo-item:hover { border-color: #c8c8cc; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* custom checkbox */
    .check-wrap {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      position: relative;
      cursor: pointer;
    }
    .check-wrap input[type="checkbox"] {
      opacity: 0;
      width: 100%; height: 100%;
      position: absolute;
      cursor: pointer;
      margin: 0;
    }
    .check-box {
      width: 22px; height: 22px;
      border: 2px solid var(--border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, border-color .15s;
      pointer-events: none;
    }
    .check-wrap input:checked ~ .check-box {
      background: var(--accent);
      border-color: var(--accent);
    }
    .check-box::after {
      content: '';
      width: 5px; height: 9px;
      border: 2px solid #fff;
      border-top: none; border-left: none;
      transform: rotate(45deg) translateY(-1px);
      opacity: 0;
      transition: opacity .15s;
    }
    .check-wrap input:checked ~ .check-box::after { opacity: 1; }

    /* text */
    .todo-text {
      flex: 1;
      font-size: 1rem;
      line-height: 1.4;
      word-break: break-word;
      transition: color .2s;
    }
    .todo-item.done .todo-text {
      color: var(--done-line);
      text-decoration: line-through;
    }

    /* delete */
    .btn-del {
      flex-shrink: 0;
      width: 28px; height: 28px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 1.1rem;
      cursor: pointer;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s;
      opacity: 0;
    }
    .todo-item:hover .btn-del { opacity: 1; }
    .btn-del:hover { background: #fff0f0; color: var(--danger); }

    /* ── Empty ── */
    .empty {
      text-align: center;
      padding: 48px 0;
      color: var(--muted);
      font-size: .9375rem;
    }

    /* ── Clear completed ── */
    .footer {
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
    }
    .btn-clear {
      background: none;
      border: none;
      color: var(--muted);
      font-size: .8125rem;
      cursor: pointer;
      padding: 4px 0;
      text-decoration: underline;
      transition: color .15s;
    }
    .btn-clear:hover { color: var(--danger); }
    .btn-clear:disabled { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
<div class="app">
  <h1>TODO</h1>

  <div class="input-row">
    <input id="newTodo" type="text" placeholder="할 일을 입력하세요..." maxlength="200" />
    <button class="btn-add" id="addBtn">추가</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">전체</button>
    <button class="filter-btn" data-filter="active">진행 중</button>
    <button class="filter-btn" data-filter="done">완료</button>
  </div>

  <p class="stats" id="stats"></p>

  <ul class="todo-list" id="todoList"></ul>

  <div class="footer">
    <button class="btn-clear" id="clearBtn" disabled>완료된 항목 삭제</button>
  </div>
</div>

<script>
  const STORAGE_KEY = 'todo-app-v1';

  let todos  = load();
  let filter = 'all';

  /* ── Persistence ── */
  function load() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
  }

  /* ── Render ── */
  function render() {
    const list = document.getElementById('todoList');
    const stats = document.getElementById('stats');
    const clearBtn = document.getElementById('clearBtn');

    const visible = todos.filter(t =>
      filter === 'all'    ? true :
      filter === 'active' ? !t.done :
                             t.done
    );

    const total    = todos.length;
    const doneCount = todos.filter(t => t.done).length;
    const leftCount = total - doneCount;

    stats.textContent = total === 0
      ? ''
      : `전체 ${total}개 · 완료 ${doneCount}개 · 남은 항목 ${leftCount}개`;

    clearBtn.disabled = doneCount === 0;

    if (visible.length === 0) {
      list.innerHTML = `<li class="empty">${
        filter === 'done'   ? '완료된 항목이 없습니다.' :
        filter === 'active' ? '모든 항목을 완료했습니다!' :
                              '할 일을 추가해보세요.'
      }</li>`;
      return;
    }

    list.innerHTML = '';
    visible.forEach(todo => {
      const li = document.createElement('li');
      li.className = 'todo-item' + (todo.done ? ' done' : '');
      li.dataset.id = todo.id;
      li.innerHTML = `
        <label class="check-wrap" aria-label="${todo.done ? '완료 취소' : '완료 표시'}">
          <input type="checkbox" ${todo.done ? 'checked' : ''} />
          <span class="check-box"></span>
        </label>
        <span class="todo-text">${escHtml(todo.text)}</span>
        <button class="btn-del" title="삭제" aria-label="삭제">&#x2715;</button>
      `;

      li.querySelector('input[type="checkbox"]').addEventListener('change', () => toggle(todo.id));
      li.querySelector('.btn-del').addEventListener('click', () => remove(todo.id));

      list.appendChild(li);
    });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── Actions ── */
  function addTodo(text) {
    text = text.trim();
    if (!text) return;
    todos.unshift({ id: Date.now(), text, done: false, createdAt: new Date().toISOString() });
    save();
    render();
  }

  function toggle(id) {
    const t = todos.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function remove(id) {
    todos = todos.filter(t => t.id !== id);
    save();
    render();
  }

  function clearDone() {
    todos = todos.filter(t => !t.done);
    save();
    render();
  }

  /* ── Event listeners ── */
  document.getElementById('addBtn').addEventListener('click', () => {
    const input = document.getElementById('newTodo');
    addTodo(input.value);
    input.value = '';
    input.focus();
  });

  document.getElementById('newTodo').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      addTodo(e.target.value);
      e.target.value = '';
    }
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  document.getElementById('clearBtn').addEventListener('click', clearDone);

  /* ── Init ── */
  render();
</script>
</body>
</html>
